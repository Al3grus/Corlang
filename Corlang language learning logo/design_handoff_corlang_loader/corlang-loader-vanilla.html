<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Corlang Loader — vanilla</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; height: 100%; }
  /* --- Corlang loader (framework-free). Drop #corlang-loader anywhere it can fill its parent. --- */
  #corlang-loader { position: fixed; inset: 0; background: #0f1620; overflow: hidden; z-index: 9999; }
  #corlang-loader .stage { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
  #corlang-loader .wordmark { display: inline-flex; align-items: center; font-family: 'Space Grotesk', system-ui, sans-serif; font-weight: 700; font-size: 56px; letter-spacing: -0.02em; color: #f4efe6; }
  #corlang-loader .letter { display: inline-block; opacity: 0; line-height: 1; }
  #corlang-loader .mark { display: inline-block; flex: 0 0 auto; width: 46px; height: 46px; transform-origin: 50% 50%; }
  #corlang-loader .mark svg { display: block; overflow: visible; }
  #corlang-loader .ring { transform-box: fill-box; transform-origin: center; }
  #corlang-loader .pct { position: absolute; top: 59%; left: 0; right: 0; text-align: center; font-family: 'Space Mono', monospace; font-size: 13px; letter-spacing: 3px; color: rgba(244,239,230,.5); }
  #corlang-loader .tag { position: absolute; top: 59%; left: 0; right: 0; text-align: center; font-family: 'Space Grotesk', sans-serif; font-size: 15px; color: rgba(244,239,230,.62); opacity: 0; }
</style>
</head>
<body>
  <div id="corlang-loader">
    <div class="stage">
      <div class="wordmark">
        <span class="letter">C</span>
        <span class="mark">
          <svg viewBox="0 0 100 100" width="46" height="46">
            <g class="ring">
              <circle class="ringArc" cx="50" cy="50" r="30" fill="none" stroke="#2f7fae" stroke-width="8" stroke-linecap="round" transform="rotate(-90 50 50)" stroke-dasharray="188.5" stroke-dashoffset="188.5"></circle>
            </g>
            <circle cx="50" cy="50" r="12.5" fill="#c8402c"></circle>
          </svg>
        </span>
        <span class="letter">r</span><span class="letter">l</span><span class="letter">a</span><span class="letter">n</span><span class="letter">g</span>
      </div>
      <div class="pct">0%</div>
      <div class="tag">Jezik u srži</div>
    </div>
  </div>

  <script>
  (function () {
    var DUR = 4400;                 // full loop in ms
    var root = document.getElementById('corlang-loader');
    var stage = root.querySelector('.stage');
    var letters = [].slice.call(root.querySelectorAll('.letter'));
    var C = 2 * Math.PI * 30;       // ring circumference
    var start = 0, markDX = 0, raf;
    var q = function (s) { return root.querySelector(s); };
    var cl = function (x) { return Math.max(0, Math.min(1, x)); };
    var eo = function (x) { return 1 - Math.pow(1 - x, 3); };

    function measure() {
      var wm = root.querySelector('.wordmark').getBoundingClientRect();
      var mk = root.querySelector('.mark').getBoundingClientRect();
      markDX = (wm.left + wm.width / 2) - (mk.left + mk.width / 2);
    }

    function frame(now) {
      var t = ((now - start) % DUR) / DUR, loadEnd = 0.5;

      var g = 1;
      if (t < 0.04) g = t / 0.04;
      else if (t > 0.93) g = cl(1 - (t - 0.93) / 0.07);
      stage.style.opacity = g;

      var prog = cl(t / loadEnd);
      q('.ringArc').style.strokeDashoffset = C * (1 - prog);
      q('.ring').style.transform = 'rotate(' + (prog * 360) + 'deg)';

      var dx = markDX || 0, s = 2.4, tx = dx;
      if (t >= loadEnd) { var sp = eo(cl((t - loadEnd) / 0.3)); s = 2.4 - 1.4 * sp; tx = dx * (1 - sp); }
      q('.mark').style.transform = 'translateX(' + tx + 'px) scale(' + Math.max(1, s) + ')';

      letters.forEach(function (el, i) {
        var st = 0.58 + i * 0.04, lp = eo(cl((t - st) / 0.16));
        el.style.opacity = lp;
        el.style.transform = 'translateY(' + ((1 - lp) * 8) + 'px)';
      });

      var pct = q('.pct');
      if (t < loadEnd) { pct.style.opacity = 1; pct.textContent = Math.round((t / loadEnd) * 100) + '%'; }
      else pct.style.opacity = cl(1 - (t - loadEnd) / 0.08);

      q('.tag').style.opacity = cl((t - 0.82) / 0.08);
      raf = requestAnimationFrame(frame);
    }

    function run() { measure(); start = performance.now(); raf = requestAnimationFrame(frame); }
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(run); else run();
    // To remove when your app is ready:  cancelAnimationFrame(raf); root.remove();
  })();
  </script>
</body>
</html>
