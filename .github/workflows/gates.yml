# Every content and code gate, on every push. Until this existed, all 117 gates only ran when
# someone remembered to run them locally with --rerun-tasks (the test task does not track
# assets as inputs, so a plain test run can silently reuse stale results — hence the flag).
name: gates

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Unit and content gates
        run: ./gradlew testSideloadDebugUnitTest --rerun-tasks --console=plain

      - name: Course proctor (shipped languages)
        run: |
          for l in hr fr pt de; do
            echo "=== $l ==="
            # Advisory while the C10-C14 backlog is being drained; flip to hard-fail
            # (remove '|| true') once the registry's Open sweeps section is empty.
            python3 tools/course/proctor.py app/src/main/assets/content/$l || true
          done

      - name: Test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: app/build/reports/tests/
